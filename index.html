<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Editor Ultra Pro - Dark Mode Preview</title>
<style>
  * { box-sizing: border-box; }
  
  body { 
    margin: 0; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    display: flex; 
    flex-direction: column; 
    height: 100vh; 
    background: #1a1a1a; 
    color: white; 
    overflow: hidden; 
  }
  
  /* THANH CÔNG CỤ */
  .topbar { 
    display: flex; 
    gap: 6px; 
    padding: 10px; 
    background: #111; 
    border-bottom: 1px solid #333; 
    overflow-x: auto; 
    align-items: center; 
    height: 60px; 
    flex-shrink: 0; 
    z-index: 10;
  }
  .topbar button { padding: 8px 12px; border: none; border-radius: 6px; background: #333; color: white; cursor: pointer; font-size: 11px; white-space: nowrap; }
  .btn-reload { background: #ce9178 !important; color: #000 !important; font-weight: bold; }
  .btn-run { background: #28a745 !important; margin-left: auto; font-weight: bold; padding: 8px 20px !important; }

  /* HỆ THỐNG TAB */
  .tab-bar { 
    display: flex; 
    background: #252526; 
    padding-left: 10px; 
    gap: 2px; 
    border-bottom: 1px solid #333; 
    height: 40px; 
    flex-shrink: 0; 
  }
  .tab-item { padding: 8px 20px; cursor: pointer; background: #2d2d2d; color: #969696; font-size: 12px; font-weight: 500; border-radius: 5px 5px 0 0; margin-top: 5px; display: flex; align-items: center; gap: 8px; }
  .tab-item.active { background: #1e1e1e; color: #ffffff; border-bottom: 2px solid #007acc; }

  /* NỘI DUNG CHÍNH */
  .main-content { 
    flex: 1; 
    position: relative; 
    display: flex; 
    flex-direction: column; 
    min-height: 0; 
  }

  .window-pane { 
    display: none; 
    height: 100%; 
    width: 100%; 
    flex-direction: column; 
    min-height: 0; 
  }
  .window-pane.active { display: flex; }

  /* EDITOR */
  .editor-container { 
    display: flex; 
    flex: 1; 
    background: #1e1e1e; 
    overflow: hidden; 
    min-height: 0;
  }
  .line-numbers { width: 40px; padding: 15px 0; text-align: center; background: #252526; color: #858585; font-family: monospace; font-size: 14px; line-height: 20px; overflow: hidden; }
  
  textarea { 
    flex: 1; 
    background: transparent; 
    color: #9cdcfe; 
    padding: 15px; 
    font-family: 'Consolas', monospace; 
    font-size: 14px; 
    line-height: 20px; 
    border: none; 
    outline: none; 
    resize: none; 
    white-space: pre; 
    overflow: auto; 
  }

  /* KẾT QUẢ (PREVIEW) - DARK MODE */
  #pane-preview { 
    flex: 1; 
    padding: 10px; 
    background: #1a1a1a; 
    display: block; 
    overflow: hidden; 
  }
  
  iframe { 
    width: 100%; 
    height: 100%; 
    border: none; 
    background: #1a1a1a; /* Nền tối cho khung chứa */
    border-radius: 4px; 
    display: block;
  }

  #error-log { display: none; background: #4a1515; color: #ff9999; padding: 10px; font-family: monospace; font-size: 12px; flex-shrink: 0; }

  /* POPUP TOOLS */
  .popup {
    display: none; position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); 
    width: 95%; background: #252526; border: 2px solid #0078d4; padding: 10px; 
    z-index: 9999; border-radius: 8px; box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
  }
  .grid { 
    display: flex; 
    flex-flow: column wrap; 
    height: 80px; 
    gap: 8px; 
    overflow-x: auto; 
    padding-bottom: 5px;
  }
  .grid button {
    flex: 0 0 auto;
    padding: 6px 12px;
    background: #333;
    color: #ddd;
    border: 1px solid #444;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
  }
</style>
</head>
<body>

<div class="topbar">
  <button onclick="document.getElementById('file-input').click()">📂 Mở File</button>
  <input type="file" id="file-input" style="display:none" accept=".html,.txt,.css,.js" onchange="loadFile(this)">
  <button class="btn-reload" onclick="resetEditor()">🔄 Reset</button>
  <button onclick="undo()">↩ Undo</button>
  <button onclick="redo()">↪ Redo</button>
  <button onclick="openPopup('quick')">⌨️ Phím nhanh</button>
  <button onclick="openPopup('html')">HTML</button>
  <button onclick="openPopup('css')">CSS</button>
  <button onclick="openPopup('js')">JS</button>
  <button class="btn-run" style="background: #007acc !important;" onclick="saveCurrentFile()">💾 LƯU FILE</button>
  <button class="btn-run" onclick="switchTab('preview')">CHẠY ▶</button>
</div>

<div class="tab-bar" id="tab-container">
  <div class="tab-item active" id="tab-editor" onclick="switchTab('editor')">📄 CHỈNH SỬA</div>
  <div class="tab-item" id="tab-preview" onclick="switchTab('preview')">👁️ KẾT QUẢ</div>
</div>

<div class="main-content">
  <div id="pane-editor" class="window-pane active">
    <div class="editor-container">
      <div id="line-numbers" class="line-numbers"></div>
      <textarea id="code" spellcheck="false" oninput="handleInput()" onscroll="syncScroll()">

</textarea>
    </div>
  </div>
  
  <div id="pane-preview" class="window-pane">
    <iframe id="preview"></iframe>
  </div>
  <div id="error-log"></div>
</div>

<div class="popup" id="popup">
  <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
    <b id="popup-title" style="color:#007acc; font-size:14px;">TOOLS</b>
    <span onclick="closePopup()" style="color:#ff5f56; cursor:pointer; font-weight:bold;">[ĐÓNG]</span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
const textarea = document.getElementById("code");
const lineNumbers = document.getElementById("line-numbers");
const errorLog = document.getElementById("error-log");
const preview = document.getElementById("preview");
const grid = document.getElementById("grid");
const popup = document.getElementById("popup");

let historyStack = [textarea.value];
let redoStack = [];

function runCode() {
  const userCode = textarea.value;
  errorLog.style.display = "none";
  
  // DARK MODE SETTINGS TRONG IFRAME
  const blobContent = `
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <style>
        html, body { 
          margin: 0; 
          padding: 15px; 
          background: #1a1a1a; /* Nền tối */
          color: #e0e0e0;      /* Chữ sáng */
          font-family: sans-serif; 
          overflow-y: auto;    /* Cho phép cuộn dọc */
          height: auto; 
          min-height: 100vh;
        }
        /* Style cho các thẻ cơ bản để phù hợp dark mode */
        a { color: #4fc3f7; }
        code { background: #333; padding: 2px 4px; border-radius: 4px; }
        
        /* Thanh cuộn Dark Mode */
        ::-webkit-scrollbar { width: 10px; background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; border: 2px solid #1a1a1a; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
      </style>
      <script>
        window.onerror = function(m, u, l, c) {
          window.parent.postMessage({type:'error', msg:m, line:l}, '*');
          return true;
        };
      <\/script>
    </head>
    <body>${userCode}</body>
    </html>`;
    
  const blob = new Blob([blobContent], { type: 'text/html;charset=UTF-8' });
  preview.src = URL.createObjectURL(blob);
}

function switchTab(type) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + type).classList.add('active');
  document.querySelectorAll('.window-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + type).classList.add('active');
  if(type === 'preview') runCode();
}

function handleInput() { updateLineNumbers(); saveToHistory(); }
function syncScroll() { lineNumbers.scrollTop = textarea.scrollTop; }

function updateLineNumbers(errorLine = null) {
  const lines = textarea.value.split('\n').length;
  let lineStr = '';
  for (let i = 1; i <= lines; i++) {
    lineStr += `<div style="height:20px; ${i === errorLine ? 'color:#f44336; font-weight:bold;' : ''}">${i}</div>`;
  }
  lineNumbers.innerHTML = lineStr;
  syncScroll();
}

function saveToHistory() {
  if (textarea.value !== historyStack[historyStack.length - 1]) {
    historyStack.push(textarea.value);
    if (historyStack.length > 50) historyStack.shift();
    redoStack = [];
  }
}

function undo() {
  if (historyStack.length > 1) {
    redoStack.push(historyStack.pop());
    textarea.value = historyStack[historyStack.length - 1];
    updateLineNumbers();
  }
}

function redo() {
  if (redoStack.length > 0) {
    const val = redoStack.pop();
    historyStack.push(val);
    textarea.value = val;
    updateLineNumbers();
  }
}

function ins(val) {
  const s = textarea.selectionStart;
  const e = textarea.selectionEnd;
  textarea.setRangeText(val, s, e, 'end');
  let pos = s + val.length;
  if (val.includes('></')) pos = s + val.indexOf('>') + 1;
  else if (val.endsWith('()') || val.endsWith('{}') || val.endsWith('""')) pos--;
  textarea.setSelectionRange(pos, pos);
  textarea.focus();
  handleInput();
}

const data = {
  quick: [{n:"Tab", a:()=>ins("  ")}, {n:"#", a:()=>ins("#")}, {n:".", a:()=>ins(".")}, {n:"(", a:()=>ins("()")}, {n:"{", a:()=>ins("{}")}, {n:"[", a:()=>ins("[]")}],
  html: [{n:"div", a:()=>ins("<div></div>")}, {n:"p", a:()=>ins("<p></p>")}, {n:"span", a:()=>ins("<span></span>")}],
  css: [{n:"color", a:()=>ins("color: ;")}, {n:"bg", a:()=>ins("background: ;")}],
  js: [{n:"log", a:()=>ins("console.log();")}]
};

function openPopup(type) {
  popup.style.display = "block";
  document.getElementById("popup-title").innerText = type.toUpperCase();
  grid.innerHTML = '';
  data[type].forEach(item => {
    const btn = document.createElement('button');
    btn.innerText = item.n;
    btn.onclick = item.a;
    grid.appendChild(btn);
  });
}
function closePopup() { popup.style.display = "none"; }
function resetEditor() { if(confirm("Xóa hết?")) { textarea.value = ""; updateLineNumbers(); } }
function saveCurrentFile() {
  const blob = new Blob([textarea.value], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "index.html";
  a.click();
}
function loadFile(input) {
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = (e) => { textarea.value = e.target.result; updateLineNumbers(); };
  reader.readAsText(file);
}

window.addEventListener('message', (e) => {
  if (e.data.type === 'error') {
    errorLog.style.display = "block";
    errorLog.innerHTML = `⚠️ Lỗi: ${e.data.msg} (Dòng ${e.data.line})`;
    updateLineNumbers(e.data.line);
  }
});

updateLineNumbers();
</script>
</body>
</html>
