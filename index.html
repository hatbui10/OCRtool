<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR nhiều ảnh</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: #fff;
  text-align: center;
  padding: 20px;
}

textarea {
  width: 95%;
  height: 120px;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  margin: 8px;
  padding: 8px 14px;
  border-radius: 6px;
  border: none;
  background: #22c55e;
  color: #fff;
  cursor: pointer;
}
</style>
</head>

<body>

<h3>Upload tối đa 50 ảnh</h3>

<input type="file" id="upload" accept="image/*" multiple>
<br>

<select id="lengthSelect">
  <option value="4">4 số</option>
  <option value="5" selected>5 số</option>
  <option value="6">6 số</option>
</select>

<p id="status"></p>

<canvas id="canvas" style="display:none;"></canvas>

<h4>Tất cả</h4>
<textarea id="all"></textarea>
<button onclick="copy('all')">Copy</button>

<h4>> 5</h4>
<textarea id="greater"></textarea>
<button onclick="copy('greater')">Copy</button>

<h4>< 5</h4>
<textarea id="less"></textarea>
<button onclick="copy('less')">Copy</button>

<script>
const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

upload.addEventListener("change", async (e) => {
  let files = Array.from(e.target.files).slice(0, 50);

  if (files.length === 0) return;

  let allNumbers = "";

  for (let index = 0; index < files.length; index++) {
    document.getElementById("status").textContent =
      `Đang xử lý ảnh ${index + 1}/${files.length}...`;

    let file = files[index];

    let img = new Image();
    img.src = URL.createObjectURL(file);

    await new Promise(resolve => {
      img.onload = resolve;
    });

    // crop giữa
    const sx = img.width * 0.35;
    const sw = img.width * 0.3;

    canvas.width = sw;
    canvas.height = img.height;

    ctx.drawImage(img, sx, 0, sw, img.height, 0, 0, sw, img.height);

    // OCR
    let result = await Tesseract.recognize(canvas, 'eng');

    let numbers = result.data.text.replace(/[^0-9]/g, "");

    allNumbers += numbers;
  }

  if (!allNumbers) {
    document.getElementById("status").textContent = "Không có số 😑";
    return;
  }

  let len = parseInt(document.getElementById("lengthSelect").value);

  let arr = allNumbers.split("").reverse();

  let sequences = [];
  for (let i = 0; i <= arr.length - len; i++) {
    sequences.push(arr.slice(i, i + len).join(""));
  }

  let greater = [];
  let less = [];

  for (let i = 0; i < sequences.length - 1; i++) {
    let current = sequences[i];
    let next = sequences[i + 1];

    let lastDigit = parseInt(next[next.length - 1]);

    if (lastDigit >= 5) {
      greater.push(`"${current}"`);
    } else if (lastDigit < 5) {
      less.push(`"${current}"`);
    }
  }

  document.getElementById("all").value =
    sequences.map(s => `"${s}"`).join(", ");

  document.getElementById("greater").value = greater.join(", ");
  document.getElementById("less").value = less.join(", ");

  document.getElementById("status").textContent = "Xong 😏";
});

function copy(id) {
  let el = document.getElementById(id);
  el.select();
  document.execCommand("copy");
}
</script>

</body>
</html>
