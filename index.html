<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Editor Final Fix</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #1a1a1a; color: white; overflow: hidden; }
  .topbar { display: flex; gap: 8px; padding: 10px; background: #111; border-bottom: 1px solid #333; overflow-x: auto; }
  .topbar button { padding: 8px 12px; border: none; border-radius: 4px; background: #333; color: white; cursor: pointer; font-size: 12px; }
  .btn-run { background: #28a745 !important; margin-left: auto; font-weight: bold; }
  .main { display: flex; flex-direction: column; flex: 1; }
  .editor-container { display: flex; height: 45%; background: #1e1e1e; border-bottom: 2px solid #333; }
  .line-numbers { width: 30px; padding: 15px 0; text-align: center; background: #252526; color: #858585; font-family: monospace; font-size: 13px; line-height: 20px; user-select: none; overflow: hidden; }
  .line-error { color: #ff4d4d !important; font-weight: bold; background: rgba(255, 77, 77, 0.3); }
  textarea { flex: 1; background: transparent; color: #9cdcfe; padding: 15px; font-family: 'Consolas', monospace; font-size: 14px; line-height: 20px; border: none; outline: none; resize: none; white-space: pre; overflow: auto; }
  #error-log { display: none; background: #4a1515; color: #ff9999; padding: 10px; font-family: monospace; font-size: 12px; border-bottom: 1px solid #ff4d4d; line-height: 1.5; }
  iframe { height: 55%; width: 100%; background: white; border: none; }
</style>
</head>
<body>

<div class="topbar">
  <button onclick="runCode()" class="btn-run">KIỂM TRA & CHẠY ▶</button>
</div>

<div class="main">
  <div class="editor-container">
    <div id="line-numbers" class="line-numbers"></div>
    <textarea id="code" spellcheck="false" oninput="updateLineNumbers()" onscroll="syncScroll()"><h1>Học Code</h1>
<script>
  console.log('Thiếu dấu ngoặc'
</script></textarea>
  </div>
  <div id="error-log"></div>
  <iframe id="preview"></iframe>
</div>

<script>
const textarea = document.getElementById("code");
const lineNumbers = document.getElementById("line-numbers");
const errorLog = document.getElementById("error-log");
const preview = document.getElementById("preview");

function updateLineNumbers(errorLine = null) {
  const lines = textarea.value.split('\n').length;
  let lineStr = '';
  for (let i = 1; i <= lines; i++) {
    lineStr += `<div class="${i === errorLine ? 'line-error' : ''}">${i}</div>`;
  }
  lineNumbers.innerHTML = lineStr;
}
function syncScroll() { lineNumbers.scrollTop = textarea.scrollTop; }

function runCode() {
  const code = textarea.value;
  errorLog.style.display = "none";
  updateLineNumbers();

  // 1. Kiểm tra lỗi HTML cơ bản (Dấu ngoặc thẻ)
  const openTags = (code.match(/</g) || []).length;
  const closeTags = (code.match(/>/g) || []).length;
  if (openTags !== closeTags) {
    showError("Lỗi cấu trúc: Thiếu dấu '<' hoặc '>'", 0);
    return;
  }

  // 2. Tạo nội dung Iframe với cơ chế báo lỗi trực tiếp
  const finalCode = `
    <!DOCTYPE html>
    <html>
    <head>
      <style>body{font-family:sans-serif;}</style>
      <script>
        window.onerror = function(msg, url, line, col) {
          // Vì mã được chèn trực tiếp, ta cần tính toán dòng dựa trên vị trí thẻ script
          window.parent.postMessage({type:'error', msg:msg, line:line, col:col}, '*');
          return true;
        };
      <\/script>
    </head>
    <body>
      ${code}
    </body>
    </html>
  `;
  
  preview.srcdoc = finalCode;
}

window.addEventListener('message', (e) => {
  if (e.data.type === 'error') {
    // Điều chỉnh: Trừ đi số dòng của phần <head> phía trên (khoảng 11 dòng ẩn)
    const offset = 14; 
    const realLine = e.data.line - offset;
    showError(e.data.msg, realLine, e.data.col);
  }
});

function showError(msg, line, col = "") {
  errorLog.style.display = "block";
  errorLog.innerHTML = `⚠️ <b>LỖI:</b> ${msg} <br> [Dòng: ${line > 0 ? line : '?'}, Vị trí: ${col}]`;
  if (line > 0) updateLineNumbers(line);
}

// Khởi tạo
updateLineNumbers();
runCode();
</script>
</body>
</html>
