<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>htmltool</title>
<style>
  * { box-sizing: border-box; }
  
  body { 
    margin: 0; 
    font-family: sans-serif; 
    display: flex; 
    flex-direction: column; 
    height: 100vh; 
    background: #1a1a1a; 
    color: white; 
    overflow: hidden; 
  }
  
  .topbar { 
    display: flex; 
    gap: 6px; 
    padding: 10px; 
    background: #111; 
    border-bottom: 1px solid #333; 
    overflow-x: auto; 
    align-items: center; 
    height: 50px; 
    flex-shrink: 0; 
    z-index: 10;
    margin: 15px auto;
  }
  .topbar button { padding: 8px 12px; border: none; border-radius: 6px; background: #333; color: white; cursor: pointer; font-size: 11px; white-space: nowrap; }
  .btn-reload { background: #ce9178 !important; color: #000 !important; font-weight: bold; }
  .btn-history { background: #444 !important; color: #fff !important; }
  .btn-run { background: #28a745 !important; margin-left: auto; font-weight: bold; padding: 8px 20px !important; }

  .tab-bar { 
    display: flex; 
    background: #252526; 
    padding-left: 10px; 
    gap: 2px; 
    border-bottom: 1px solid #333; 
    user-select: none; 
    height: 40px; 
    flex-shrink: 0; 
  }
  .tab-item { padding: 8px 20px; cursor: pointer; background: #2d2d2d; color: #969696; font-size: 12px; font-weight: 500; border-radius: 5px 5px 0 0; margin-top: 5px; display: flex; align-items: center; gap: 8px; }
  .tab-item.active { background: #1e1e1e; color: #ffffff; border-bottom: 2px solid #007acc; }

  .main-content { 
    flex: 1; 
    position: relative; 
    display: flex; 
    flex-direction: column; 
    min-height: 0; 
  }

  /* SỬA TẠI ĐÂY: Dùng flex: 1 thay vì height: 95% để không bị cắt đuôi */
  .window-pane { 
    display: none; 
    flex: 1; 
    width: 100%; 
    flex-direction: column; 
    min-height: 0; 
  }
  .window-pane.active { display: flex; }

  .editor-container { 
    display: flex; 
    flex: 1; 
    background: #1e1e1e; 
    overflow: hidden; 
    position: relative; 
    min-height: 0;
  }
  .line-numbers { width: 40px; padding: 15px 0; text-align: center; background: #252526; color: #858585; font-family: monospace; font-size: 14px; line-height: 20px; user-select: none; overflow: hidden; }
  
  textarea { 
    flex: 1; 
    background: transparent; 
    color: #9cdcfe; 
    padding: 15px; 
    font-family: 'Consolas', monospace; 
    font-size: 14px; 
    line-height: 20px; 
    border: none; 
    outline: none; 
    resize: none; 
    white-space: pre; 
    overflow: auto; 
  }

  /* SỬA TẠI ĐÂY: Bỏ justify-content và align-items để không bị mất đầu trang */
  #pane-preview { 
    flex: 1; 
    padding: 15px; 
    background: #1a1a1a; 
    display: block; 
    min-height: 0;
  }
  
  iframe { 
    width: 100%; 
    height: 100%; 
    border: none; 
    background: #1a1a1a; 
    border-radius: 8px; 
    box-shadow: 0 5px 20px rgba(0,0,0,0.5); 
    display: block;
  }

  #error-log { display: none; background: #4a1515; color: #ff9999; padding: 10px; font-family: monospace; font-size: 12px; flex-shrink: 0; }

  .popup {
    display: none; position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); 
    width: 95%; background: #252526; border: 2px solid #0078d4; padding: 2px 3px; 
    z-index: 9999; border-radius: 8px; box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
  }
  .grid { 
    display: flex; 
    flex-flow: column wrap; 
    height: 65px; 
    gap: 8px; 
    margin-top: 5px; 
    overflow-x: auto; 
    overflow-y: hidden; 
    padding: 5px; 
    align-content: flex-start; 
  }

  .grid button {
    flex: 0 0 auto; width: max-content; display: inline-block; 
    padding: 4px 12px; height: calc(50% - 5px); 
    white-space: nowrap; border: 1px solid #444;
    border-radius: 4px; background: #333; color: #ddd;
    font-size: 12px; font-weight: bold; cursor: pointer;
  }
</style>
</head>
<body>

<div class="topbar">
  <button class="btn-history" onclick="document.getElementById('file-input').click()">📂 Mở File</button>
  <input type="file" id="file-input" style="display:none" onchange="loadFile(this)">
  <button class="btn-reload" onclick="resetEditor()">🔄 Reset</button>
  <button class="btn-history" onclick="undo()">↩ Undo</button>
  <button class="btn-history" onclick="redo()">↪ Redo</button>
  <button onclick="openPopup('quick')">⌨️ Phím nhanh</button>
  <button onclick="openPopup('html')">HTML</button>
  <button onclick="openPopup('css')">CSS</button>
  <button onclick="openPopup('js')">JS</button>
  <button class="btn-run" style="background: #007acc !important;" onclick="saveCurrentFile()">💾 LƯU FILE</button>
  <button class="btn-run" onclick="runCode()">CHẠY ▶</button>
</div>

<div class="tab-bar">
  <div class="tab-item active" id="tab-editor" onclick="switchTab('editor')">📄 CHỈNH SỬA CODE</div>
  <div class="tab-item" id="tab-preview" onclick="switchTab('preview')">👁️ KẾT QUẢ</div>
</div>

<div class="main-content">
  <div id="pane-editor" class="window-pane active">
    <div class="editor-container">
      <div id="line-numbers" class="line-numbers"></div>
      <textarea id="code" spellcheck="false" oninput="handleInput()" onscroll="syncScroll()"></textarea>
    </div>
  </div>
  <div id="pane-preview" class="window-pane">
    <iframe id="preview"></iframe>
  </div>
  <div id="error-log"></div>
</div>

<div class="popup" id="popup">
  <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
    <b id="popup-title" style="color:#007acc; font-size:12px;">TOOLS</b>
    <span onclick="closePopup()" style="color:red; cursor:pointer; font-weight:bold; padding: 2px 8px;">[ĐÓNG]</span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
const textarea = document.getElementById("code");
const lineNumbers = document.getElementById("line-numbers");
const errorLog = document.getElementById("error-log");
const preview = document.getElementById("preview");
const grid = document.getElementById("grid");
const popup = document.getElementById("popup");

let historyStack = ["<h1>Chào mừng!</h1>"];
let redoStack = [];
textarea.value = historyStack[0];

function saveToHistory() {
  const currentVal = textarea.value;
  if (currentVal !== historyStack[historyStack.length - 1]) {
    historyStack.push(currentVal);
    redoStack = [];
    if (historyStack.length > 50) historyStack.shift();
  }
}

function undo() {
  if (historyStack.length > 1) {
    redoStack.push(historyStack.pop());
    textarea.value = historyStack[historyStack.length - 1];
    updateLineNumbers();
  }
}

function redo() {
  if (redoStack.length > 0) {
    const next = redoStack.pop();
    historyStack.push(next);
    textarea.value = next;
    updateLineNumbers();
  }
}

function handleInput() { saveToHistory(); updateLineNumbers(); }
function syncScroll() { lineNumbers.scrollTop = textarea.scrollTop; }

function updateLineNumbers(errorLine = null) {
  const lines = textarea.value.split('\n').length;
  let lineStr = '';
  for (let i = 1; i <= lines; i++) {
    lineStr += `<div style="height:20px">${i}</div>`;
  }
  lineNumbers.innerHTML = lineStr;
  syncScroll();
}

// SỬA TẠI ĐÂY: Thêm style Dark Mode và overflow auto cho nội dung iframe
function runCode() {
  const userCode = textarea.value;
  errorLog.style.display = "none";
  const blobContent = `
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <style>
        html, body { 
          margin: 0; padding: 15px; 
          background: #1a1a1a; color: white; 
          font-family: sans-serif; 
          overflow-y: auto; height: auto; min-height: 100%;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
      </style>
    </head>
    <body>${userCode}</body>
    </html>`;
  const blob = new Blob([blobContent], { type: 'text/html;charset=UTF-8' });
  preview.src = URL.createObjectURL(blob);
  switchTab('preview');
}

function switchTab(type) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + (type === 'editor' ? 'editor' : 'preview')).classList.add('active');
  document.querySelectorAll('.window-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + type).classList.add('active');
}

const data = {
  quick: [{n:"Tab", a:()=>ins("  ")}, {n:"#", a:()=>ins("#")}, {n:".", a:()=>ins(".")}, {n:"(", a:()=>ins("()")}, {n:"{", a:()=>ins("{}")}],
  html: [{n:"div", a:()=>ins("<div></div>")}, {n:"p", a:()=>ins("<p></p>")}],
  css: [{n:"color", a:()=>ins("color: ;")}],
  js: [{n:"log", a:()=>ins("console.log();")}]
};

function ins(val) {
  const s = textarea.selectionStart, e = textarea.selectionEnd;
  textarea.setRangeText(val, s, e, 'end');
  let newPos = s + val.length;
  if (val.includes('></')) newPos = s + val.indexOf('>') + 1;
  else if (val.endsWith('()') || val.endsWith('{}')) newPos--;
  textarea.setSelectionRange(newPos, newPos);
  textarea.focus();
  handleInput();
}

function openPopup(type) { 
  popup.style.display = "block"; 
  grid.innerHTML = ''; 
  data[type].forEach(item => {
    const btn = document.createElement('button');
    btn.innerText = item.n; btn.onclick = item.a;
    grid.appendChild(btn);
  });
}
function closePopup() { popup.style.display = "none"; }
function resetEditor() { if(confirm("Reset?")) { textarea.value = ""; updateLineNumbers(); } }
function loadFile(i) {
  const r = new FileReader();
  r.onload = (e) => { textarea.value = e.target.result; updateLineNumbers(); };
  r.readAsText(i.files[0]);
}
function saveCurrentFile() {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([textarea.value], {type:"text/html"}));
  a.download = "index.html"; a.click();
}

updateLineNumbers();
</script>
</body>
</html>
