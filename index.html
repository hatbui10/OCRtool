<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Editor Ultra Pro - Tab Edition</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #1a1a1a; color: white; overflow: hidden; }
  
  /* THANH CÔNG CỤ TRÊN CÙNG */
  .topbar { display: flex; gap: 6px; padding: 10px; background: #111; border-bottom: 1px solid #333; align-items: center; }
  .topbar button { padding: 8px 12px; border: none; border-radius: 6px; background: #333; color: white; cursor: pointer; font-size: 11px; }
  .btn-reload { background: #ce9178 !important; color: #000 !important; font-weight: bold; }
  .btn-run { background: #28a745 !important; margin-left: auto; font-weight: bold; padding: 8px 20px !important; }

  /* HỆ THỐNG TAB KIỂU EXCEL */
 /* --- HỆ THỐNG TAB NÂNG CẤP --- */
.tab-bar { 
  display: flex; 
  background: #252526; 
  padding-left: 10px;
  gap: 2px;
  border-bottom: 1px solid #333;
  user-select: none;
}

.tab-item { 
  padding: 8px 20px; 
  cursor: pointer; 
  background: #2d2d2d; 
  color: #969696; 
  font-size: 12px; 
  font-weight: 500; 
  border-radius: 5px 5px 0 0; /* Bo góc trên giống sheet */
  margin-top: 5px;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 8px;
  border: 1px solid transparent;
  border-bottom: none;
}

/* Hiệu ứng khi di chuột qua */
.tab-item:hover { 
  background: #37373d; 
  color: #e1e1e1; 
}

/* Trạng thái Tab đang hoạt động */
.tab-item.active { 
  background: #1e1e1e; 
  color: #ffffff; 
  border: 1px solid #333;
  border-bottom: 2px solid #007acc; /* Thanh màu xanh đặc trưng */
  position: relative;
  z-index: 2;
}

/* Thêm icon giả lập bằng CSS cho đẹp */
.tab-item::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
#tab-editor::before { background: #e34f26; } /* Màu cam cho Code */
#tab-preview::before { background: #28a745; } /* Màu xanh cho Kết quả */

/* --- KHU VỰC NỘI DUNG --- */
.main-content { 
  flex: 1; 
  background: #1e1e1e;
  box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); /* Tạo độ sâu */
}

/* Làm mượt việc ẩn hiện cửa sổ */
.window-pane { 
  display: none; 
  height: 100%; 
  width: 100%; 
  animation: fadeIn 0.3s ease; /* Hiệu ứng hiện ra mượt */
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Tinh chỉnh lại thanh cuộn (Scrollbar) cho hiện đại */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-track {
  background: #1e1e1e;
}
::-webkit-scrollbar-thumb {
  background: #333;
  border-radius: 5px;
  border: 2px solid #1e1e1e;
}
::-webkit-scrollbar-thumb:hover {
  background: #444;
}




  /* VÙNG HIỂN THỊ NỘI DUNG */
  .main-content { flex: 1; position: relative; overflow: hidden; }
  
  /* Cửa sổ Code */
  .window-pane { display: none; height: 100%; width: 100%; }
  .window-pane.active { display: flex; }

  .editor-container { display: flex; width: 100%; height: 100%; background: #1e1e1e; overflow: auto; }
  .line-numbers { width: 35px; padding: 15px 0; text-align: center; background: #252526; color: #858585; font-family: monospace; font-size: 13px; line-height: 20px; user-select: none; }
  textarea { flex: 1; background: transparent; color: #9cdcfe; padding: 15px; font-family: 'Consolas', monospace; font-size: 14px; line-height: 20px; border: none; outline: none; resize: none; white-space: pre; }

  /* Cửa sổ Preview (Iframe) */
  iframe { width: 100%; height: 100%; border: none; background: white; }

  /* BÁO LỖI */
  #error-log { position: absolute; bottom: 0; width: 100%; background: #4a1515; color: #ff9999; padding: 8px; font-family: monospace; font-size: 12px; z-index: 10; display: none; }

  /* POPUP PHÍM NHANH */
  .popup { display: none; position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); width: 95%; background: #252526; border: 2px solid #0078d4; padding: 5px; z-index: 9999; border-radius: 8px; }
  .grid { display: flex; flex-flow: column wrap; height: 60px; gap: 6px; overflow-x: auto; padding: 5px; }
  .grid button { padding: 5px 10px; background: #333; color: white; border: 1px solid #444; border-radius: 4px; font-size: 11px; }
</style>
</head>






<body>

<div class="topbar">
  <button class="btn-reload" onclick="resetEditor()">🔄 Reset</button>
  <button onclick="openPopup('quick')">⌨️ Phím nhanh</button>
  <button onclick="openPopup('html')">HTML</button>
  <button onclick="openPopup('css')">CSS</button>
  <button onclick="openPopup('js')">JS</button>
  <button class="btn-run" onclick="runCode()">CHẠY & XEM ▶</button>
</div>

<div class="tab-bar">
  <div class="tab-item active" id="tab-editor" onclick="switchTab('editor')">📄 CHỈNH SỬA CODE</div>
  <div class="tab-item" id="tab-preview" onclick="switchTab('preview')">👁️ KẾT QUẢ (PREVIEW)</div>
</div>

<div class="main-content">
  <div id="pane-editor" class="window-pane active">
    <div class="editor-container">
      <div id="line-numbers" class="line-numbers"></div>
      <textarea id="code" spellcheck="false" oninput="updateLineNumbers()" onscroll="syncScroll()"><h1>Chào mừng bạn!</h1>
<p>Đây là giao diện dạng Sheet.</p>




<script>
  console.log("Đã chuyển sang tab Code");
</script>


</textarea>
    </div>
  </div>

  <div id="pane-preview" class="window-pane">
    <iframe id="preview"></iframe>
  </div>

  <div id="error-log"></div>
</div>

<div class="popup" id="popup">
  <div style="text-align: right;"><span onclick="closePopup()" style="color:red; cursor:pointer; font-weight:bold; padding: 5px;">[ĐÓNG]</span></div>
  <div class="grid" id="grid"></div>
</div>

<script>
const textarea = document.getElementById("code");
const lineNumbers = document.getElementById("line-numbers");
const errorLog = document.getElementById("error-log");
const preview = document.getElementById("preview");
const grid = document.getElementById("grid");
const popup = document.getElementById("popup");

// CHUYỂN TAB
function switchTab(type) {
  // Xử lý nút tab
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + type).classList.add('active');

  // Xử lý nội dung hiển thị
  document.querySelectorAll('.window-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + type).classList.add('active');

  // Nếu chuyển sang tab preview, tự động chạy code luôn cho mới
  if(type === 'preview') runCode();
}

function runCode() {
  const userCode = textarea.value;
  errorLog.style.display = "none";
  updateLineNumbers();

  // THÊM DÒNG NÀY: Chèn meta charset vào đầu Iframe
  const blobContent = `
    <!DOCTYPE html>
    <html>
      <head>
        <meta charset="UTF-8"> <style>body{font-family:sans-serif;}</style>
        <script>
          window.onerror=function(m,u,l,c){
            window.parent.postMessage({type:'error',msg:m,line:l,col:c},'*');
            return true;
          };
        <\/script>
      </head>
      <body>${userCode}</body>
    </html>`;

  const blob = new Blob([blobContent], { type: 'text/html;charset=UTF-8' }); // Thêm charset ở đây nữa cho chắc
  preview.src = URL.createObjectURL(blob);
}



// Giữ nguyên các hàm insert, wrap, popup của bạn...
const data = {
  quick: [{n:"Tab", a:()=>ins("  ")}, {n:"#", a:()=>ins("#")}, {n:".", a:()=>ins(".")}, {n:"(", a:()=>ins("(")}, {n:")", a:()=>ins(")")}],
  html: [{n:"<div>", a:()=>wrap("<div>","</div>")}, {n:"<h1>", a:()=>wrap("<h1>","</h1>")}, {n:"<a>", a:()=>wrap("<a href=''>","</a>")}],
  css: [{n:"color", a:()=>ins("color: red;")}, {n:"flex", a:()=>ins("display: flex;")}],
  js: [{n:"log", a:()=>ins('console.log("");')}, {n:"alert", a:()=>ins('alert("");')}]
};

function ins(val) {
  const s = textarea.selectionStart;
  const e = textarea.selectionEnd;
  textarea.setRangeText(val, s, e, 'end');
  textarea.focus();
  updateLineNumbers();
}

function wrap(open, close) {
  const s = textarea.selectionStart;
  const e = textarea.selectionEnd;
  const sel = textarea.value.substring(s, e);
  textarea.setRangeText(open + sel + close, s, e, 'end');
  textarea.focus();
  updateLineNumbers();
}

function openPopup(type) {
  popup.style.display = "block";
  grid.innerHTML = '';
  if (data[type]) {
    data[type].forEach(item => {
      const btn = document.createElement('button');
      btn.innerText = item.n;
      btn.onclick = item.a;
      grid.appendChild(btn);
    });
  }
}

function closePopup() { popup.style.display = "none"; }

function updateLineNumbers(errorLine = null) {
  const lines = textarea.value.split('\n').length;
  let lineStr = '';
  for (let i = 1; i <= lines; i++) {
    lineStr += `<div class="${i === errorLine ? 'line-error' : ''}">${i}</div>`;
  }
  lineNumbers.innerHTML = lineStr;
}

function syncScroll() { lineNumbers.scrollTop = textarea.scrollTop; }

window.addEventListener('message', (e) => {
  if (e.data.type === 'error') {
    errorLog.style.display = "block";
    errorLog.innerHTML = `⚠️ Lỗi: ${e.data.msg} (Dòng ${e.data.line})`;
    switchTab('editor'); // Tự chuyển về tab code khi có lỗi
    updateLineNumbers(e.data.line);
  }
});

function resetEditor() {
    textarea.value = "<h1>Chào mừng bạn!</h1>\n<p>Đây là giao diện dạng Sheet.</p>";
    runCode();
}

updateLineNumbers();
</script>
</body>
</html>
